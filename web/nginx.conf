server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: serve the app shell for any non-asset path.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy the API (and the SSE stream) to dashboard-api. The trailing
    # slash on proxy_pass strips the /api/ prefix: /api/stream -> /stream.
    location /api/ {
        proxy_pass http://dashboard-api:8005/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";

        # Required for Server-Sent Events to stream instead of buffering.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }
}
